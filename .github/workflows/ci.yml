name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: {fetch-depth: 0}
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.26.5'
          cache: true
      - name: Format
        run: test -z "$(gofmt -l main.go core/*.go)"
      - name: Vet
        run: go vet ./...
      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...
      - name: Build
        run: go build ./...
      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...
      - name: Installer and generated-config smoke test
        run: |
          BROWSERSTREAM_CONFIG=/tmp/browserstream-config.json ./install.sh --init-only
          go run . -config /tmp/browserstream-config.json -validate-config
          rm -f /tmp/browserstream-config.json coturn/turnserver.conf
      - name: Compose validation
        run: cp config.example.json config.json && docker compose config >/dev/null
      - name: Container build
        run: docker build --pull -t browserstream:ci .
  secrets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: {fetch-depth: 0}
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.26.5'
          cache: false
      - name: Secret scan (all history)
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          gitleaks git --redact --no-banner .
