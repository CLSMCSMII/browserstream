name: browserstream
services:
  browserstream:
    build:
      context: .
      dockerfile: Dockerfile
    image: browserstream:local
    user: "${BROWSERSTREAM_UID:-1000}:${BROWSERSTREAM_GID:-1000}"
    restart: unless-stopped
    ports:
      - "${BROWSERSTREAM_BIND_ADDRESS:-172.16.10.18}:${BROWSERSTREAM_PORT:-18080}:8080"
    volumes:
      - ${BROWSERSTREAM_CONFIG:-./config.json}:/app/config.json:ro
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    init: true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

  coturn:
    profiles: ["turn"]
    image: coturn/coturn:4.14.0-r0@sha256:0c0e8fc0c263b85a134e9e4242b5e46e1f4c077c5029633511191c05b5c2c814
    restart: unless-stopped
    network_mode: host
    user: "0:0"
    command: ["-c", "/etc/coturn/turnserver.conf"]
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    read_only: true
    tmpfs:
      - /var/lib/coturn:size=16m,nosuid,nodev
      - /tmp:size=16m,noexec,nosuid,nodev
    cap_drop: ["ALL"]
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
