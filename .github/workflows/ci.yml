name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: {fetch-depth: 0}
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.26.5'
          cache: true
      - name: Format
        run: test -z "$(gofmt -l main.go core/*.go)"
      - name: Vet
        run: go vet ./...
      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...
      - name: Build
        run: go build ./...
      - name: AwareStream frontend contract
        run: |
          npx --yes html-validate@11.5.5 files/main.html
          node --check files/static/main.js
          python3 - <<'PY'
          import json
          from pathlib import Path
          html = Path('files/main.html').read_text()
          js = Path('files/static/main.js').read_text()
          css = Path('files/static/main.css').read_text()
          notice = Path('NOTICE').read_text().lower()
          config = json.loads(Path('config.example.json').read_text())
          config_text = Path('config.example.json').read_text().lower()
          assert config['app_name'] == 'AwareStream'
          assert config['public_url'] == 'https://browserstream.example.com'
          assert config['allowed_origins'] == ['https://browserstream.example.com']
          assert config['turn']['urls'] == ['turn:browserstream.example.com:3478']
          assert config['coturn']['realm'] == 'browserstream.example.com'
          assert config['coturn']['listening_ip'] == ''
          assert config['coturn']['relay_ip'] == ''
          assert 'aware.co.th' not in config_text and 'aware.local' not in config_text
          assert '172.16.10.18' not in config_text
          assert '<title>AwareStream</title>' in html
          assert '>AwareStream</a>' in html
          assert '>AwareStreaming</div>' in html
          assert "const PRODUCT_NAME = 'AwareStream';" in js
          assert "const KIOSK_NAME = 'AwareStreaming';" in js
          assert 'kiosk-instruction' not in html
          assert '/static/main.css?v=3' in html
          assert '/static/main.js?v=4' in html
          assert 'body.kiosk-display #kiosk::before' in css
          assert 'BrowserStream' not in html
          assert 'QRCode' not in js and "el('qrcode')" not in js
          assert 'qrcode.min.js' not in html
          assert '#qrcode' not in css
          assert not Path('files/static/qrcode.min.js').exists()
          assert 'qrcodejs' not in notice
          PY
      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...
      - name: Installer and generated-config smoke test
        run: |
          BROWSERSTREAM_CONFIG=/tmp/browserstream-config.json ./install.sh --init-only
          python3 - <<'PY'
          import json
          template = json.load(open('config.example.json'))
          assert all(r['display_token'] == '' for r in template['rooms'])
          assert template['turn']['shared_secret'] == ''
          c = json.load(open('/tmp/browserstream-config.json'))
          assert c['public_url'] == 'https://browserstream.example.com'
          assert [r['id'] for r in c['rooms']] == ['awmeeting', 'smmeeting']
          assert all(len(r['display_token']) >= 32 for r in c['rooms'])
          assert c['turn']['urls'] == ['turn:browserstream.example.com:3478']
          assert c['allowed_origins'] == ['https://browserstream.example.com']
          assert c['coturn']['realm'] == 'browserstream.example.com'
          generated = open('/tmp/browserstream-config.json').read().lower()
          assert 'aware.co.th' not in generated and 'aware.local' not in generated
          assert '172.16.10.18' not in generated
          assert len(c['turn']['shared_secret']) >= 48
          PY
          go run . -config /tmp/browserstream-config.json -validate-config
          before=$(sha256sum /tmp/browserstream-config.json | cut -d' ' -f1)
          BROWSERSTREAM_CONFIG=/tmp/browserstream-config.json ./install.sh --init-only
          after=$(sha256sum /tmp/browserstream-config.json | cut -d' ' -f1)
          test "$before" = "$after"
          rm -f /tmp/browserstream-config.json coturn/turnserver.conf
          if BROWSERSTREAM_UID=65531 BROWSERSTREAM_CONFIG=/tmp/browserstream-mismatch-config.json ./install.sh --init-only; then
            echo 'mismatched non-root UID unexpectedly accepted' >&2
            exit 1
          fi
          test ! -e /tmp/browserstream-mismatch-config.json
          sudo env BROWSERSTREAM_CONFIG=/tmp/browserstream-root-config.json ./install.sh --init-only
          test "$(stat -c %u /tmp/browserstream-root-config.json)" = 65532
          test "$(stat -c %g /tmp/browserstream-root-config.json)" = 65532
          sudo rm -f /tmp/browserstream-root-config.json coturn/turnserver.conf
      - name: Compose validation and hardening assertions
        run: |
          cp config.example.json config.json
          docker compose --profile turn config --format json > /tmp/compose.json
          BROWSERSTREAM_BIND_ADDRESS=127.0.0.1 docker compose config --format json > /tmp/compose-override.json
          python3 - <<'PY'
          import json
          c = json.load(open('/tmp/compose.json'))
          app = c['services']['browserstream']
          turn = c['services']['coturn']
          assert app['ports'][0]['host_ip'] == '172.16.10.18'
          assert set(turn['cap_add']) == {'NET_BIND_SERVICE', 'SETUID', 'SETGID'}
          assert turn['cap_drop'] == ['ALL']
          assert turn['security_opt'] == ['no-new-privileges:true']
          override = json.load(open('/tmp/compose-override.json'))
          assert override['services']['browserstream']['ports'][0]['host_ip'] == '127.0.0.1'
          PY
          rm -f config.json /tmp/compose.json /tmp/compose-override.json
      - name: Container build
        run: docker build --pull -t browserstream:ci .
      - name: Coturn restricted-capability runtime smoke test
        run: |
          docker run --rm \
            --cap-drop ALL \
            --cap-add NET_BIND_SERVICE \
            --cap-add SETUID \
            --cap-add SETGID \
            --security-opt no-new-privileges:true \
            coturn/coturn:4.14.0-r0@sha256:0c0e8fc0c263b85a134e9e4242b5e46e1f4c077c5029633511191c05b5c2c814 \
            --version
  secrets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: {fetch-depth: 0}
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.26.5'
          cache: false
      - name: Secret scan (all history)
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          gitleaks git --redact --no-banner .
